<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Autor — LibraManager</title>
  <link rel="stylesheet" href="style.css">
  <script src="layout.js"></script>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div id="header-placeholder"></div>

<main class="main-content">
  <div class="page-header">
    <div class="page-header-left">
      <h1>Cadastrar Autor</h1>
      <p>Adicione um novo autor ao sistema</p>
    </div>
    <a href="autores.html" class="btn btn-secondary">← Voltar</a>
  </div>

  <div style="max-width:680px">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Dados do Autor</div>
        <span class="badge badge-neutral">Novo</span>
      </div>
      <div class="card-body">
        <div class="form-grid" style="gap:18px">
          <div class="form-group">
            <label>Nome completo <span class="req">*</span></label>
            <input type="text" placeholder="Ex: Carlos Drummond de Andrade" value="Fernando Pessoa">
          </div>

          <div class="form-grid form-grid-2">
            <div class="form-group">
              <label>Ano de Nascimento</label>
              <input type="number" placeholder="AAAA" value="1888">
            </div>
            <div class="form-group">
              <label>Ano de Falecimento</label>
              <input type="number" placeholder="AAAA ou deixe vazio">
            </div>
          </div>

          <div class="form-group">
            <label>Nacionalidade</label>
            <input type="text" placeholder="Ex: Brasileiro" value="Português">
          </div>

          <div class="form-group">
            <label>Biografia <span style="font-weight:400;color:var(--text-muted)">(opcional)</span></label>
            <textarea placeholder="Breve biografia do autor..." style="min-height:140px">Fernando Pessoa foi um poeta, escritor, filósofo e tradutor português, considerado um dos maiores poetas da língua portuguesa e um dos mais influentes do século XX.</textarea>
            <div class="form-hint">Máximo 500 caracteres</div>
          </div>

          <div class="form-group">
            <label>Site ou Referência</label>
            <input type="url" placeholder="https://..." value="https://www.fpessoa.com.pt">
          </div>
        </div>

        <div class="form-actions" style="margin-top:24px">
          <a href="autores.html" class="btn btn-primary">💾 Salvar Autor</a>
          <a href="autores.html" class="btn btn-secondary">Cancelar</a>
        </div>
      </div>
    </div>
  </div>
</main>

<script>initLayout('autores', 'Cadastrar Autor', 'Autores › Cadastrar');</script>
</body>
</html>
